name: Docs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  error-table-freshness:
    name: Error table up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs/errors.md is not stale
        # Fails with exit code 1 when the generated block would change,
        # meaning a new Error variant was added without regenerating the table.
        run: python scripts/generate_error_table.py --check

  error-table-tests:
    name: generate_error_table.py tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest and coverage
        run: pip install pytest pytest-cov

      - name: Run script tests with coverage
        run: |
          pytest scripts/test_generate_error_table.py -v --tb=short \
            --cov=scripts/generate_error_table \
            --cov-report=term-missing \
            --cov-fail-under=95
